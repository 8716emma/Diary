<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 즐거움 - 돌림판 & AI 동물상</title>
    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1437405101634727"
     crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-color: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1e293b;
            --accent-color: #0284c7;
            --accent-hover: #0369a1;
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
            height: 100vh;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        /* --- 상단 바 --- */
        header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, var(--accent-color), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #themeBtn {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(8px);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 메인 콘텐츠 영역 --- */
        main {
            flex: 1;
            position: relative;
            padding: 1rem;
            overflow-y: auto;
        }

        .page {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.4s ease-out;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* --- 돌림판 전용 스타일 --- */
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        #wheelCanvas {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.3));
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: var(--text-color);
            outline: none;
        }

        .primary-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .primary-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        #result {
            margin-top: 1rem;
            text-align: center;
            min-height: 80px;
        }

        .result-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--accent-color);
            color: white;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        /* --- AI 테스트 전용 스타일 --- */
        .ai-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .upload-area {
            width: 100%;
            height: 200px;
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-area:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        #image-preview-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 1rem;
        }

        #face-image {
            width: 100%;
            display: block;
        }

        .prediction-bar-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            height: 32px;
            border-radius: 16px;
            position: relative;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .prediction-bar {
            height: 100%;
            border-radius: 16px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .prediction-label {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 600;
            font-size: 0.875rem;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .ai-result-card {
            margin-top: 1.5rem;
            text-align: center;
        }

        .result-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
        .result-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-top: 0.5rem; }

        /* --- 하단 내비게이션 --- */
        nav {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 1rem 2rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-color);
            opacity: 0.5;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-item.active {
            opacity: 1;
            color: var(--accent-color);
        }

        .nav-icon { font-size: 1.5rem; }

        .hidden { display: none; }
        
        /* 스피너 */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body class="dark-mode">
    <div id="app">
        <header>
            <div class="logo">HAPPY.LAB</div>
            <button id="themeBtn">🌙</button>
        </header>

        <main>
            <!-- 돌림판 페이지 -->
            <section id="wheelPage" class="page active">
                <div class="glass-card">
                    <div class="wheel-container">
                        <canvas id="wheelCanvas" width="500" height="500"></canvas>
                        <div id="result"></div>
                        <div class="input-group">
                            <input type="text" id="optionInput" placeholder="새로운 옵션 입력...">
                            <button id="addOptionBtn" class="secondary-btn">추가</button>
                        </div>
                        <button id="spinBtn" class="primary-btn" style="width: 100%; padding: 1rem;">행운의 돌림판 돌리기!</button>
                    </div>
                </div>
            </section>

            <!-- AI 동물상 페이지 -->
            <section id="aiPage" class="page">
                <div class="glass-card">
                    <div class="ai-container">
                        <h2 style="text-align: center; margin-bottom: 0.5rem;">AI 동물상 테스트</h2>
                        <p style="text-align: center; font-size: 0.875rem; opacity: 0.7; margin-bottom: 1rem;">당신의 얼굴은 어떤 동물을 닮았을까요?</p>
                        
                        <label class="upload-area" for="upload-input">
                            <span style="font-size: 2.5rem; margin-bottom: 0.5rem;">📸</span>
                            <span style="font-weight: 600;">사진 업로드하기</span>
                            <input type="file" id="upload-input" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                        </label>

                        <div id="loading-spinner" class="hidden" style="margin: 2rem 0; text-align: center;">
                            <div class="spinner" style="margin: 0 auto 1rem;"></div>
                            <p>AI가 분석 중입니다...</p>
                        </div>

                        <div id="image-preview-container" class="hidden">
                            <img id="face-image" src="#" alt="미리보기">
                        </div>

                        <div id="label-container" style="width: 100%; margin-top: 1rem;"></div>
                        
                        <div id="ai-result-message" class="ai-result-card hidden glass-card" style="width: 100%; background: rgba(255,255,255,0.05);"></div>
                    </div>
                </div>
            </section>
        </main>

        <nav>
            <div class="nav-item active" onclick="showPage('wheelPage')">
                <span class="nav-icon">🎡</span>
                <span>돌림판</span>
            </div>
            <div class="nav-item" onclick="showPage('aiPage')">
                <span class="nav-icon">🐱</span>
                <span>동물상</span>
            </div>
        </nav>
    </div>

    <!-- 스크립트 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
